<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: #000;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("fondoweb.png") center/cover no-repeat;
    opacity: 0.32;
    filter: blur(2.5px);
    transform: scale(1.04);
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.75), rgba(0,0,0,0.55), rgba(150,105,20,0.45));
    z-index: -1;
}

.container {
    max-width: 420px;
    margin: auto;
    text-align: center;
    padding: 10px 18px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.logo {
    width: 200px;
    max-width: 80%;
    margin: 10px auto 5px;
}

/* NOTIFICACIÓN ESTILO RESEÑA */
.notification {
    margin: 8px auto;
    max-width: 320px;
    background: rgba(255,255,255,0.94);
    color: #202124;
    padding: 10px 12px;
    border-radius: 12px;
    font-size: 13px;
    text-align: left;
    box-shadow: 0 4px 18px rgba(0,0,0,0.35);
    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}

.notification.show {
    opacity: 1;
    transform: translateY(0);
}

.review-top {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
}

.google-dot {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: conic-gradient(#4285f4 0 25%, #34a853 0 50%, #fbbc05 0 75%, #ea4335 0);
    color: white;
    font-weight: 900;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.review-name {
    font-weight: 800;
    color: #202124;
}

.stars {
    color: #fbbc05;
    font-size: 14px;
    letter-spacing: 1px;
}

.review-text {
    color: #3c4043;
    font-weight: 600;
}

/* BONUS SIN RECUADRO */
.bonus {
    margin: 12px 0 8px;
    font-size: 21px;
    line-height: 1.25;
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 8px #000;
}

.bonus .gift {
    font-size: 28px;
    vertical-align: middle;
    margin-right: 4px;
}

.bonus .extra {
    color: #00ff66;
    text-shadow: 0 0 12px rgba(0,255,102,0.95);
}

/* BOTÓN WHATSAPP */
.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px;
    font-size: 21px;
    font-weight: 900;
    border-radius: 999px;
    background: rgba(37,211,102,0.22);
    backdrop-filter: blur(14px);
    border: 2px solid rgba(37,211,102,0.95);
    color: #ffffff;
    text-decoration: none;
    margin: 14px 0;
    box-shadow: 0 0 22px rgba(37,211,102,0.65);
    animation: pulse 0.85s infinite alternate;
}

.wa-icon {
    width: 30px;
    height: 30px;
    display: block;
}

@keyframes pulse {
    from {
        transform: scale(1);
        box-shadow: 0 0 16px rgba(37,211,102,0.5);
    }
    to {
        transform: scale(1.08);
        box-shadow: 0 0 38px rgba(37,211,102,1);
    }
}

.ganamos {
    width: 180px;
    margin: 8px auto;
}

.slots-container {
    overflow: hidden;
    margin-top: 10px;
}

.slots {
    display: flex;
    gap: 10px;
    animation: scroll 22s linear infinite;
}

.slot {
    min-width: 120px;
    height: 170px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

@keyframes scroll {
    0% {transform: translateX(0);}
    100% {transform: translateX(-50%);}
}
</style>
</head>
