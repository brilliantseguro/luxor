<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxor Red Casino</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #000, #1a1a1a, #d4af37);
    color: white;
}

/* CONTENEDOR CENTRAL */
.container {
    max-width: 400px;
    margin: auto;
    text-align: center;
    padding: 20px;
}

/* LOGO */
.logo {
    width: 260px;
    margin: 20px auto;
}

/* BOTON */
.btn {
    display: block;
    padding: 18px;
    font-size: 20px;
    border-radius: 12px;
    background: rgba(0,255,100,0.15);
    backdrop-filter: blur(10px);
    border: 2px solid #00ff88;
    color: #00ff88;
    text-decoration: none;
    margin: 20px 0;
}
.btn:hover {
    background: #00ff88;
    color: black;
}

/* GANAMOS */
.ganamos {
    width: 180px;
    margin: 10px auto;
}

/* SLOTS */
.slots-container {
    overflow: hidden;
    margin-top: 20px;
}

.slots {
    display: flex;
    gap: 10px;
    animation: scroll 20s linear infinite;
}

.slot {
    min-width: 120px;
    height: 160px;
    border-radius: 10px;
    background-size: cover;
    background-position: center;
}

@keyframes scroll {
    0% {transform: translateX(0);}
    100% {transform: translateX(-50%);}
}

/* NOTIFICACION */
.notification {
    position: fixed;
    bottom: 20px;
    left: 20px;
    right: 20px;
    max-width: 300px;
    margin: auto;
    background: rgba(0,0,0,0.9);
    padding: 12px;
    border-radius: 8px;
    border: 1px solid gold;
    text-align: center;
    font-size: 14px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.4s;
}
.notification.show {
    opacity: 1;
    transform: translateY(0);
}
</style>

</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <!-- BOTON -->
    <a class="btn" href="https://wa.me/549XXXXXXXXXX" target="_blank">
        📲 Pedir mi bono
    </a>

    <!-- GANAMOS -->
    <img src="ganamos.png" class="ganamos">

    <!-- SLOTS -->
    <div class="slots-container">
        <div class="slots">
            <div class="slot" style="background-image:url('https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=400')"></div>
            <div class="slot" style="background-image:url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?w=400')"></div>
            <div class="slot" style="background-image:url('https://images.unsplash.com/photo-1607863680198-23d4b2565df0?w=400')"></div>
            <div class="slot" style="background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400')"></div>

            <!-- DUPLICADO -->
            <div class="slot" style="background-image:url('https://images.unsplash.com/photo-1605810230434-7631ac76ec81?w=400')"></div>
            <div class="slot" style="background-image:url('https://images.unsplash.com/photo-1596838132731-3301c3fd4317?w=400')"></div>
            <div class="slot" style="background-image:url('https://images.unsplash.com/photo-1607863680198-23d4b2565df0?w=400')"></div>
            <div class="slot" style="background-image:url('https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400')"></div>
        </div>
    </div>

</div>

<!-- NOTIFICACION -->
<div id="notif" class="notification"></div>

<script>
const mensajes = [
"Maria cargó $35.000",
"Juan cargó $12.000",
"Lucas cargó $50.000",
"Sofía cargó $18.000",
"Martín cargó $22.000",
"Camila cargó $40.000",
"Diego cargó $15.000",
"Valentina cargó $28.000",
"Nicolás cargó $60.000",
"Paula cargó $10.000"
];

const notif = document.getElementById("notif");

function mostrarNotif() {
    const random = mensajes[Math.floor(Math.random() * mensajes.length)];
    notif.innerText = random;
    notif.classList.add("show");

    setTimeout(() => {
        notif.classList.remove("show");
    }, 3000);
}

setInterval(mostrarNotif, 4000);
</script>

</body>
</html>
