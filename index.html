<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: #000;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("fondoweb.png") center/cover no-repeat;
    opacity: 0.32;
    filter: blur(2.5px);
    transform: scale(1.04);
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.75), rgba(0,0,0,0.55), rgba(150,105,20,0.45));
    z-index: -1;
}

.container {
    max-width: 420px;
    margin: auto;
    text-align: center;
    padding: 10px 18px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.logo {
    width: 200px;
    max-width: 80%;
    margin: 10px auto 5px;
}

.notification {
    margin: 8px auto;
    max-width: 280px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    padding: 10px;
    border-radius: 10px;
    border: 1px solid gold;
    font-size: 13px;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}

.notification.show {
    opacity: 1;
    transform: translateY(0);
}

.bonus {
    margin: 12px 0 8px;
    padding: 10px 12px;
    border-radius: 18px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,215,0,0.65);
    box-shadow: 0 0 18px rgba(255,215,0,0.35);
    font-size: 20px;
    line-height: 1.25;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 8px #000, 0 0 10px rgba(255,215,0,0.8);
}

.bonus .gift {
    display: inline-block;
    font-size: 28px;
    margin-right: 6px;
    filter: drop-shadow(0 0 6px gold);
    animation: giftBounce 1s infinite alternate;
}

@keyframes giftBounce {
    from { transform: rotate(-6deg) scale(1); }
    to { transform: rotate(6deg) scale(1.15); }
}

.btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px;
    font-size: 21px;
    font-weight: 900;
    border-radius: 999px;
    background: rgba(0,255,120,0.18);
    backdrop-filter: blur(14px);
    border: 2px solid rgba(0,255,136,0.95);
    color: #00ff88;
    text-decoration: none;
    margin: 14px 0;
    box-shadow: 0 0 20px rgba(0,255,136,0.55);
    animation: pulse 0.85s infinite alternate;
}

.btn .wa {
    width: 27px;
    height: 27px;
    display: inline-block;
}

@keyframes pulse {
    from {
        transform: scale(1);
        box-shadow: 0 0 16px rgba(0,255,136,0.45);
    }
    to {
        transform: scale(1.08);
        box-shadow: 0 0 36px rgba(0,255,136,0.95);
    }
}

.ganamos {
    width: 180px;
    margin: 8px auto;
}

.slots-container {
    overflow: hidden;
    margin-top: 10px;
}

.slots {
    display: flex;
    gap: 10px;
    animation: scroll 22s linear infinite;
}

.slot {
    min-width: 120px;
    height: 170px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

@keyframes scroll {
    0% {transform: translateX(0);}
    100% {transform: translateX(-50%);}
}
</style>
</head>
