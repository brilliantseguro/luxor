<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxor Red Casino</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: #000;
    overflow-x: hidden;
}

/* FONDO PIRÁMIDE */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("fondoweb.png") center/cover no-repeat;
    opacity: 0.32;
    filter: blur(2.5px);
    transform: scale(1.04);
    z-index: -2;
}

/* CAPA OSCURA/DORADA PARA QUE SE LEA BIEN */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background:
        linear-gradient(180deg, rgba(0,0,0,0.72), rgba(0,0,0,0.55), rgba(150,105,20,0.45));
    z-index: -1;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    text-align: center;
    padding: 18px;
    min-height: 100vh;
}

/* LOGO */
.logo {
    width: 270px;
    max-width: 90%;
    margin: 16px auto 8px;
    display: block;
}

/* NOTIFICACIÓN */
.notification {
    margin: 10px auto;
    max-width: 300px;
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(8px);
    padding: 12px;
    border-radius: 10px;
    border: 1px solid gold;
    font-size: 14px;
    box-shadow: 0 0 14px rgba(255,215,0,0.35);
    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}
.notification.show {
    opacity: 1;
    transform: translateY(0);
}

/* BONUS */
.bonus {
    margin: 20px 0 10px;
    font-size: 22px;
    line-height: 1.25;
    font-weight: 900;
    background: linear-gradient(90deg, #ffd700, #ffae00, #fff, #ffd700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 14px rgba(255,215,0,0.75);
}

/* BOTÓN */
.btn {
    display: block;
    padding: 18px;
    font-size: 21px;
    font-weight: 900;
    border-radius: 16px;
    background: rgba(0,255,120,0.18);
    backdrop-filter: blur(12px);
    border: 2px solid #00ff88;
    color: #00ff88;
    text-decoration: none;
    margin: 18px 0;
    box-shadow: 0 0 22px rgba(0,255,136,0.45);
    animation: pulse 1.4s infinite alternate;
}

@keyframes pulse {
    from { transform: scale(1); box-shadow: 0 0 14px rgba(0,255,136,0.35); }
    to { transform: scale(1.03); box-shadow: 0 0 28px rgba(0,255,136,0.8); }
}

/* GANAMOS */
.ganamos {
    width: 210px;
    max-width: 80%;
    margin: 10px auto 18px;
    display: block;
}

/* SLOTS */
.slots-container {
    overflow: hidden;
    margin-top: 18px;
    padding: 8px 0 18px;
}

.slots {
    display: flex;
    gap: 10px;
    animation: scroll 22s linear infinite;
    width: max-content;
}

.slot {
    min-width: 130px;
    height: 180px;
    border-radius: 14px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 14px rgba(255,215,0,0.65);
    border: 1px solid rgba(255,215,0,0.6);
}

.slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

/* ANIMACIÓN */
@keyframes scroll {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
}

@media (max-width: 480px) {
    .logo {
        width: 250px;
    }

    .bonus {
        font-size: 20px;
    }

    .btn {
        font-size: 20px;
    }
}
</style>
</head>

<body>

<div class="container">

    <img src="logo.png" class="logo" alt="Luxor Red">

    <div id="notif" class="notification"></div>

    <div class="bonus">
        🎁 Te regalamos un 30% EXTRA a tu recarga
    </div>

    <a class="btn" href="https://wa.me/549XXXXXXXXXX" target="_blank">
        📲 Pedir mi bono
    </a>

    <img src="ganamos.png" class="ganamos" alt="Ganamos.net">

    <div class="slots-container">
        <div class="slots">

            <div class="slot"><img src="1111.png" alt="Joker's Jewels Cash"></div>
            <div class="slot"><img src="4444.png" alt="Joker's Jewels Hot"></div>

            <div class="slot"><img src="6666.webp" alt="Sugar Rush"></div>
            <div class="slot"><img src="5555.jpg" alt="Volcano Rising"></div>

            <div class="slot"><img src="1111.png" alt="Joker's Jewels Cash"></div>
            <div class="slot"><img src="4444.png" alt="Joker's Jewels Hot"></div>
            <div class="slot"><img src="3333.png" alt="Sweet Bonanza"></div>
            <div class="slot"><img src="2222.png" alt="Big Bass Bonanza"></div>
            <div class="slot"><img src="6666.webp" alt="Sugar Rush"></div>
            <div class="slot"><img src="5555.jpg" alt="Volcano Rising"></div>

        </div>

</div>

<script>
const mensajes = [
    "María acaba de cargar $35.000 en Luxor Red",
    "Juan acaba de cargar $12.000 en Luxor Red",
    "Lucas acaba de cargar $50.000 en Luxor Red",

    "Martín acaba de cargar $22.000 en Luxor Red",
    "Camila acaba de cargar $40.000 en Luxor Red",

const notif = document.getElementById("notif");

mostrarNotif();
setInterval(mostrarNotif, 4500);
</script>

</body>
</html>
