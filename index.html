<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxor Red Casino</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    background: #000;
    overflow-x: hidden;
}

/* FONDO PIRÁMIDE */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: url("fondoweb.png") center/cover no-repeat;
    opacity: 0.32;
    filter: blur(2.5px);
    transform: scale(1.04);
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(180deg, rgba(0,0,0,0.75), rgba(0,0,0,0.55), rgba(150,105,20,0.45));
    z-index: -1;
}

/* CONTENEDOR */
.container {
    max-width: 420px;
    margin: auto;
    text-align: center;
    padding: 10px 18px 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

/* LOGO */
.logo {
    width: 200px;
    max-width: 80%;
    margin: 10px auto 5px;
}

/* NOTIFICACION */
.notification {
    margin: 8px auto;
    max-width: 280px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    padding: 10px;
    border-radius: 10px;
    border: 1px solid gold;
    font-size: 13px;
    box-shadow: 0 0 10px rgba(255,215,0,0.3);
    opacity: 0;
    transform: translateY(10px);
    transition: 0.4s;
}
.notification.show {
    opacity: 1;
    transform: translateY(0);
}

/* BONUS */
.bonus {
    margin: 10px 0 5px;
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(90deg, #ffd700, #ffae00, #fff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 0 0 10px gold;
}

/* BOTON */
.btn {
    display: block;
    padding: 18px;
    font-size: 20px;
    font-weight: bold;
    border-radius: 14px;
    background: rgba(0,255,120,0.18);
    backdrop-filter: blur(12px);
    border: 2px solid #00ff88;
    color: #00ff88;
    text-decoration: none;
    margin: 12px 0;
    box-shadow: 0 0 18px rgba(0,255,136,0.4);
    animation: pulse 1.5s infinite alternate;
}

@keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.05); }
}

/* GANAMOS */
.ganamos {
    width: 180px;
    margin: 8px auto;
}

/* SLOTS */
.slots-container {
    overflow: hidden;
    margin-top: 10px;
}

.slots {
    display: flex;
    gap: 10px;
    animation: scroll 22s linear infinite;
}

.slot {
    min-width: 120px;
    height: 170px;
    border-radius: 12px;
    overflow: hidden;
    background: #000;
    box-shadow: 0 0 10px rgba(255,215,0,0.5);
}

.slot img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* ANIMACION */
@keyframes scroll {
    0% {transform: translateX(0);}
    100% {transform: translateX(-50%);}
}
</style>
</head>

<body>

<div class="container">

    <!-- LOGO -->
    <img src="logo.png" class="logo">

    <!-- NOTIFICACION -->
    <div id="notif" class="notification"></div>

    <!-- BONUS -->
    <div class="bonus">
        🎁 Te regalamos un 30% EXTRA a tu recarga
    </div>

    <!-- BOTON -->
    <a class="btn" href="https://wa.me/549XXXXXXXXXX" target="_blank">
        📲 Pedir mi bono
    </a>

    <!-- GANAMOS -->
    <img src="ganamos.png" class="ganamos">

    <!-- SLOTS -->
    <div class="slots-container">
        <div class="slots">

            <div class="slot"><img src="1111.png"></div>
            <div class="slot"><img src="4444.png"></div>
            <div class="slot"><img src="3333.png"></div>
            <div class="slot"><img src="2222.png"></div>
            <div class="slot"><img src="6666.webp"></div>
            <div class="slot"><img src="5555.jpg"></div>

            <!-- DUPLICADO -->
            <div class="slot"><img src="1111.png"></div>
            <div class="slot"><img src="4444.png"></div>
            <div class="slot"><img src="3333.png"></div>
            <div class="slot"><img src="2222.png"></div>
            <div class="slot"><img src="6666.webp"></div>
            <div class="slot"><img src="5555.jpg"></div>

        </div>
    </div>

</div>

<script>
const mensajes = [
"Maria cargó $35.000",
"Juan cargó $12.000",
"Lucas cargó $50.000",
"Sofía cargó $18.000",
"Martín cargó $22.000",
"Camila cargó $40.000",
"Diego cargó $15.000",
"Valentina cargó $28.000",
"Nicolás cargó $60.000",
"Paula cargó $10.000"
];

const notif = document.getElementById("notif");

function mostrarNotif() {
    const random = mensajes[Math.floor(Math.random() * mensajes.length)];
    notif.innerText = random;
    notif.classList.add("show");

    setTimeout(() => {
        notif.classList.remove("show");
    }, 3000);
}

mostrarNotif();
setInterval(mostrarNotif, 4000);
</script>

</body>
</html>
