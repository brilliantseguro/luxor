<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxor Red Casino</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle, #1a1a1a, #000);
    color: white;
    text-align: center;
}

/* LOGO */
.logo {
    width: 280px;
    margin: 30px auto;
}

/* BOTON */
.btn {
    padding: 18px 35px;
    font-size: 22px;
    border-radius: 15px;
    background: rgba(0,255,100,0.15);
    backdrop-filter: blur(10px);
    border: 2px solid #00ff88;
    color: #00ff88;
    text-decoration: none;
    display: inline-block;
    margin: 20px;
    transition: 0.3s;
}
.btn:hover {
    background: #00ff88;
    color: black;
}

/* GANAMOS */
.ganamos {
    width: 200px;
    margin: 20px auto;
}

/* SLOTS */
.slots-container {
    overflow: hidden;
    margin-top: 30px;
}

.slots {
    display: flex;
    gap: 10px;
    animation: scroll 15s linear infinite;
}

.slot {
    min-width: 140px;
    height: 180px;
    border-radius: 10px;
    background-size: cover;
    background-position: center;
}

@keyframes scroll {
    0% {transform: translateX(0);}
    100% {transform: translateX(-50%);}
}

/* NOTIFICACION */
.notification {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(0,0,0,0.85);
    padding: 15px 20px;
    border-radius: 10px;
    border: 1px solid gold;
    box-shadow: 0 0 10px gold;
    font-size: 14px;
    opacity: 0;
    transform: translateY(20px);
    transition: 0.5s;
}
.notification.show {
    opacity: 1;
    transform: translateY(0);
}
</style>

</head>

<body>

<!-- LOGO -->
<img src="logo.png" class="logo">

<!-- NOTIFICACION -->
<div id="notif" class="notification"></div>

<script>
const mensajes = [
"Maria cargó $35.000 en Luxor Red",
"Juan cargó $12.000 en Luxor Red",
"Lucas cargó $50.000 en Luxor Red",
"Sofía cargó $18.000 en Luxor Red",

"Camila cargó $40.000 en Luxor Red",
"Diego cargó $15.000 en Luxor Red",
"Valentina cargó $28.000 en Luxor Red",
"Nicolás cargó $60.000 en Luxor Red",
"Paula cargó $10.000 en Luxor Red"
];

const notif = document.getElementById("notif");

function mostrarNotif() {
    const random = mensajes[Math.floor(Math.random() * mensajes.length)];
    notif.innerText = random;
    notif.classList.add("show");

    setTimeout(() => {

}

setInterval(mostrarNotif, 4000);
